<div class="layout layout--padded">
    {{ partial:components/heading size="h2" :label="title" center="true" }}
    {{ if categories }}
    <ul class="layout__categories">
        {{ categories }}
        <li class="layout__category-item">
            <a href="{{ url }}" aria-label="{{ title }}" class="layout__category-link">
                {{ title }}
            </a>
        </li>
        {{ /categories }}
    </ul>
    {{ else }}
    <p class="layout__no-categories">There are no categories.</p>
    {{ /if }}
</div>
