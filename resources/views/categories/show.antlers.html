<div class="layout layout--padded">
    {{ partial:components/heading size="h2" label="Category: {title}" center="true" }}
    {{ entries paginate="9" as="posts" }}
    <div class="layout__grid layout__grid--responsive">
        {{ posts }}
        {{ partial:components/post_card }}
        {{ /posts }}
    </div>

    {{ partial:partials/pagination }}
    {{ /entries }}
</div>
