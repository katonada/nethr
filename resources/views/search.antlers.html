<div class="layout layout--padded">
    {{ partial:components/heading size="h2" label="Results for: '{get:q}'" center="true" }}
    {{ search:results as="results" }}
    {{ if results }}
    <ul class="layout__grid layout__grid--responsive">
        {{ results }}
        <li>
            {{ partial:components/post_card }}
        </li>
        {{ /results }}
    </ul>
    {{ else }}
    <p class="layout__message layout__message--no-results">No results found.</p>
    {{ /if }}
    {{ /search:results }}
</div>
